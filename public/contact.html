<!DOCTYPE html>
<html>
  <head>
    <title>Contact Form Target</title>
  </head>
  <body>
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="siteAddress" />
      <textarea name="projectDescription"></textarea>
      <textarea name="message"></textarea>
      <input type="hidden" name="form-name" value="contact" />
    </form>
    
    <form name="contactPage" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="siteAddress" />
      <textarea name="message"></textarea>
      <input type="hidden" name="form-name" value="contactPage" />
    </form>
  </body>
</html>
