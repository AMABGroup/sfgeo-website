<!DOCTYPE html>
<html>
  <head>
    <title>Contact Form</title>
  </head>
  <body>
    <!-- Netlify form parsing target -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <textarea name="projectDescription"></textarea>
    </form>

    <!-- Netlify form parsing target for the main Contact Page -->
    <form name="contactPage" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="siteAddress" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
